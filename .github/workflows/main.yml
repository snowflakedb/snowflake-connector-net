    steps:
      - uses: actions/checkout@v4
      - name: Build and Run Tests in Docker
        id: run-tests-rockylinux9
        run: ./ci/test_rockylinux9_docker.sh
        env:
          PARAMETER_SECRET: ${{ secrets.PARAMETER_SECRET }}
          snowflake_cloud_env: ${{ matrix.cloud_env }}
          net_version: ${{ matrix.dotnet }}
          DOTNET_COVERAGE_VERSION: "17.8.4"
          use_dotnet_run: ${{ matrix.use_dotnet_run }}
          test_args: ${{ matrix.test_args }}
        shell: bash
      - name: Flaky Test Warning
        if: hashFiles('Snowflake.Data.Tests/.retried_tests') != ''
        shell: bash
        run: |
          RETRIED=$(cat Snowflake.Data.Tests/.retried_tests)
          echo "::warning::The following integration tests were flaky and passed on retry: $RETRIED"
